services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dimovtax
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dimovtax"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dimovtax
      DEMO_PASSWORD_HASH: scrypt$$nl9GT1cUTXBUX9ZDRa2WhQ$$zwuB3iaiu93ecWs2Taf_n3ZwCwWpw7Z452OlzS8WDv5OLlSIy4xtG2d1ZE-VZTUxZ937ABOGdA5QnyyqAw9Pig
      SESSION_SECRET: local-docker-session-secret-change-me
      NODE_ENV: production
    ports:
      - "3200:3000"

volumes:
  postgres-data:
